name: .NET Build and Test

on:
  workflow_call:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: string
      os:
        description: 'Operating system to run on'
        required: false
        default: 'ubuntu-latest'
        type: string

permissions:
  checks: write

jobs:
  build:
    name: 🏗️ Build and test

    runs-on: ${{ inputs.os }}

    env:
      ARTIFACTS_PATH: ${{ github.workspace }}/.artifacts/
      BINLOG_PATH: ${{ github.workspace }}/.artifacts/binlogs/
      TESTRESULTS_PATH: ${{ github.workspace }}/.artifacts/testresults/
      COVERAGEREPORT_PATH: ${{ github.workspace }}/.artifacts/coveragereports/

    steps:
      - uses: actions/checkout@v6
        name: 🛒 Checkout code
        with:
          filter: blob:none

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.props', '**/*.targets', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 📥 Restore dependencies
        id: restore
        run: dotnet restore --artifacts-path ${{ env.ARTIFACTS_PATH }} -bl:${{ env.BINLOG_PATH }}/restore.binlog

      - name: 🏗️ Build
        id: build
        run: dotnet build --configuration ${{ inputs.configuration }} --no-restore --artifacts-path ${{ env.ARTIFACTS_PATH }} -bl:${{ env.BINLOG_PATH }}/build.binlog

      - name: 🧪 Test
        id: test
        run: dotnet test --configuration ${{ inputs.configuration }} --no-build -bl:${{ env.BINLOG_PATH }}/test.binlog --output Detailed --results-directory ${{ env.TESTRESULTS_PATH }}
        env:
          ARTIFACTS_PATH: ${{ env.ARTIFACTS_PATH }}

      - name: 📄 Publish test results
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        with:
          name: Test Results
          path: ${{ env.TESTRESULTS_PATH }}/*.trx
          reporter: dotnet-trx

      - name: 📊 ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        id: reportgenerator
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}        
        with:
          reports: '${{ env.TESTRESULTS_PATH }}/*.cobertura.xml'
          targetdir: ${{ env.COVERAGEREPORT_PATH }}
          reporttypes: HTML;MarkdownSummaryGithub

      - name: 📝 Publish coverage summary
        if: ${{ steps.reportgenerator.outcome == 'success' }}      
        run: cat ${{ env.COVERAGEREPORT_PATH }}/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        shell: bash
  
      - name: 📤 Publish code coverage results
        if: ${{ steps.reportgenerator.outcome == 'success' }}      
        uses: actions/upload-artifact@v6
        with:
          name: CoverageReport-${{ github.job }}
          path: ${{ env.COVERAGEREPORT_PATH }}         

      - name: 📤 Publish binlogs (on failure)
        uses: actions/upload-artifact@v6
        if: ${{ steps.restore.outcome == 'failure' || steps.build.outcome == 'failure' || steps.test.outcome == 'failure' || runner.debug }}
        with:
          name: Binlogs-${{ github.job }}
          path: ${{ env.BINLOG_PATH }}

      - name: 📤 Publish test artifacts (on failure)
        uses: actions/upload-artifact@v6
        if: ${{ steps.test.outcome == 'failure' || runner.debug }}
        with:
          name: TestResults-${{ github.job }}
          path: ${{ env.TESTRESULTS_PATH }}
