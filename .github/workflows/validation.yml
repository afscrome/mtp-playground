name: .NET

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: string

permissions:
  checks: write

jobs:
  build:
    uses: ./.github/workflows/dotnet.yml
    with:
      configuration: ${{ inputs.configuration || 'Release' }}
      version: >-
        0.0.${{ github.run_number }}
        ${{
          case(
            github.ref_name == github.event.repository.default_branch, '',
            github.event_name == 'pull_request', format('-pr{0}', github.event.pull_request.number),
            github.ref_type == 'branch', format('-alpha+branch.{0}', github.ref_name),
            format('-{0}', github.ref_type)
          )
        }}
